services:
  - type: web
    name: ahwoo-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false          # 在 Render Dashboard 手動填入
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_OA_ACCOUNT_ID
        sync: false          # LINE OA Manager 內部帳號 ID（數字），從 manager.line.biz/account/{這串數字}/... 取得
      # - key: ANTHROPIC_API_KEY   # v2.0 已移除 Claude API，可選填或直接刪除
      #   sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false          # 將 google_service_account.json 內容貼入此欄位
      # - key: CLAUDE_MODEL   # v2.0 已移除
      - key: LOG_LEVEL
        value: info
      - key: HUMAN_TURN_THRESHOLD
        value: "10"
    healthCheckPath: /health
    autoDeploy: true          # 推 git 自動部署
