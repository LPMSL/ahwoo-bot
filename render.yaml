services:
  - type: web
    name: ahwoo-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false          # 在 Render Dashboard 手動填入
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false          # 將 google_service_account.json 內容貼入此欄位
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5
      - key: LOG_LEVEL
        value: info
      - key: HUMAN_TURN_THRESHOLD
        value: "10"
    healthCheckPath: /health
    autoDeploy: true          # 推 git 自動部署
